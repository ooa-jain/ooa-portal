<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin Login — OoA Semester Readiness</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --navy: #0A2558;
      --gold: #F4A819;
      --orange: #E85C1A
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #ffffff;
      background-image: linear-gradient(rgba(10, 37, 88, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(10, 37, 88, 0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .login-card {
      background: #fff;
      border-radius: 18px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .4)
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px
    }

    .logo-area img {
      height: 52px;
      margin-bottom: 14px;
      display: block;
      margin-left: auto;
      margin-right: auto
    }

    .logo-area h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--navy);
      line-height: 1.2
    }

    .logo-area p {
      font-size: 12px;
      color: #8892aa;
      margin-top: 5px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase
    }

    .field {
      margin-bottom: 18px
    }

    .field label {
      display: block;
      font-size: 11.5px;
      font-weight: 800;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 7px
    }

    .field input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #dde3f0;
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      transition: .15s;
      background: #fafbff
    }

    .field input:focus {
      border-color: var(--navy);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(10, 37, 88, .08)
    }

    .btn-login {
      width: 100%;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: .15s;
      margin-top: 8px;
      letter-spacing: .02em
    }

    .btn-login:hover {
      background: #0d3070;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(10, 37, 88, .35)
    }

    .flash {
      background: #fde8e8;
      border: 1.5px solid #e0a0a0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #7a1a1a;
      margin-bottom: 16px;
      font-weight: 600
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #8892aa
    }

    .back-link a {
      color: var(--navy);
      font-weight: 700;
      text-decoration: none
    }

    .admin-badge {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      font-size: 10.5px;
      font-weight: 800;
      padding: 3px 12px;
      border-radius: 99px;
      margin-bottom: 10px;
      letter-spacing: .07em
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="logo-area">
      <img src="/static/images/jain.png" alt="Jain University" onerror="this.style.display='none'">
      <div style="font-weight: 700; color: var(--navy); font-size: 14px; margin-bottom: 16px; letter-spacing: 0.02em;">
        JAIN (Deemed-to-be University)</div>
      <span class="admin-badge">ADMIN PANEL</span>
      <h1 style="margin-top: 4px;">Academic Office Portal</h1>
      <p>Semester Readiness — OoA</p>
    </div>
    {% with msgs = get_flashed_messages() %}
    {% if msgs %}<div class="flash">{% for m in msgs %}{{ m }}{% endfor %}</div>{% endif %}
    {% endwith %}
    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter admin username" autofocus required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>
    <div class="back-link"><a href="/">← Back to Submission Form</a></div>
  </div>
</body>

</html>
